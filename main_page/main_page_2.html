<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Индивидуальный график сотрудников</title>
    <link href="style.css"
          rel="stylesheet"
          type="text/css">
    
</head>
<body>
<div class="container">
    <div class="main-table">
        <h1>Индивидуальный график сотрудников</h1>
        <div id="userRoleDisplay" class="role-badge"></div>
        
        <!-- Форма выбора / добавления (только для руководителя) -->
        <div id="managerPanel" style="display: none;">
            <form id="selectionForm">
                <label for="alliance">Выберите альянс:</label>
                <select id="alliance" required onchange="updateGroups()">
                    <option value="">-- Выберите альянс --</option>
                    <option value="Пупкина">Альянс Пупкина</option>
                    <option value="Тумбочкина">Альянс Тумбочкина</option>
                    <option value="Петровича">Альянс Петровича</option>
                    <option value="Сидоровича">Альянс Сидоровича</option>
                </select><br><br>
                
                <label for="group">Выберите группу:</label>
                <select id="group" required onchange="updateEmployees()" disabled>
                    <option value="">-- Сначала выберите альянс --</option>
                </select><br><br>
                
                <label for="employee">Выберите сотрудника:</label>
                <select id="employee" required disabled>
                    <option value="">-- Сначала выберите группу --</option>
                </select><br><br>
            </form>
            
            <form id="scheduleForm" style="display: none;">
                <label for="date">Выберите дату:</label>
                <select id="date" required></select><br><br>
                <div id="consecutiveWarning" class="alert" style="display: none;"></div>
                <label for="startTime">Начало смены:</label>
                <select id="startTime" required onchange="toggleEndTime()"></select><br><br>
                <label for="endTime">Конец смены:</label>
                <select id="endTime" required disabled></select><br><br>
                <button type="submit">➕ Добавить график</button>
            </form>
        </div>
        
        <!-- Блок деталей сотрудника (модальное окно в виде блока) -->
        <div id="employeeDetails" class="employee-details" style="display: none;">
            <button class="back-btn" onclick="hideEmployeeDetails()">← Назад к списку</button>
            <h3 id="detailsEmployeeName"></h3>
            <div id="detailsAllianceGroup"></div>
            <div id="shiftsList" class="shift-list"></div>
        </div>
        
        <h2>📅 Список графиков</h2>
        <div id="employeesTable"></div>
    </div>
    
    <div class="summary">
        <h2>Общий свод</h2>
        <div id="summaryWeekdays"></div>
        <div id="summaryWeekends" class="warning"></div>
    </div>
    <div id="errorMessage" class="error"></div>
</div>

<!-- Модальное окно удаления -->
<div id="deleteModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeDeleteModal()">&times;</span>
        <h3>Подтверждение</h3>
        <p id="deleteModalMessage"></p>
        <div class="modal-buttons">
            <button class="cancel-btn" onclick="closeDeleteModal()">Отмена</button>
            <button class="confirm-btn" id="confirmDeleteBtn">Подтвердить</button>
        </div>
    </div>
</div>

<script>
    // ---------- ДАННЫЕ АЛЬЯНСОВ ----------
    const alliancesData = {
        'Пупкина': [
            { name: 'Группа Сизых', employees: ['Сизый Александр Петрович', 'Сизый Мария Ивановна'] },
            { name: 'Группа Василькова', employees: ['Васильков Иван Сергеевич', 'Василькова Ольга Васильевна'] },
            { name: 'Группа Петькова', employees: ['Петьков Дмитрий Алексеевич', 'Петькова Елена Дмитриевна'] },
            { name: 'Группа Ивановых', employees: ['Ивановых Николай Петрович', 'Ивановых Анна Николаевна'] }
        ],
        'Тумбочкина': [
            { name: 'Группа Кузнецовых', employees: ['Кузнецов Виктор Михайлович', 'Кузнецова Светлана Викторовна'] },
            { name: 'Группа Смирновых', employees: ['Смирновых Алексей Иванович', 'Смирновых Наталья Алексеевна'] },
            { name: 'Группа Поповых', employees: ['Поповых Евгений Сергеевич', 'Поповых Ирина Евгеньевна'] },
            { name: 'Группа Волковых', employees: ['Волковых Павел Дмитриевич', 'Волкова Екатерина Павловна'] }
        ],
        'Петровича': [
            { name: 'Группа Морозовых', employees: ['Морозовых Андрей Владимирович', 'Морозова Ольга Андреевна'] },
            { name: 'Группа Лебедевых', employees: ['Лебедевых Сергей Николаевич', 'Лебедева Мария Сергеевна'] },
            { name: 'Группа Козловых', employees: ['Козловых Дмитрий Юрьевич', 'Козлова Анна Дмитриевна'] },
            { name: 'Группа Соболевых', employees: ['Соболевых Иван Петрович', 'Соболева Елена Ивановна'] }
        ],
        'Сидоровича': [
            { name: 'Группа Никифоровых', employees: ['Никифоровых Роман Александрович', 'Никифорова Татьяна Романовна'] },
            { name: 'Группа Поляковых', employees: ['Поляковых Михаил Васильевич', 'Полякова Ирина Михайловна'] },
            { name: 'Группа Савельевых', employees: ['Савельевых Алексей Константинович', 'Савельева Надежда Алексеевна'] },
            { name: 'Группа Тарасовых', employees: ['Тарасовых Владимир Сергеевич', 'Тарасова Ольга Владимировна'] }
        ]
    };

    // Текущий пользователь (имитация входа)
    let currentUser = null;
    let currentDeleteCallback = null;

    // ---------- ФУНКЦИИ ДЛЯ РАБОТЫ С ХРАНИЛИЩЕМ ----------
    function loadEmployees() {
        return JSON.parse(localStorage.getItem('employees') || '[]');
    }
    function saveEmployees(employees) {
        localStorage.setItem('employees', JSON.stringify(employees));
    }

    // Получить смены сотрудника с полем approved
    function getEmployeeShiftsWithStatus(employee) {
        return (employee.shifts || []).map(s => ({ ...s, approved: s.approved === true }));
    }

    // Инициализация пользователя (демо: передаём через sessionStorage или параметр)
    function initUser() {
        // Имитация входа: проверяем sessionStorage, иначе создаём тестового руководителя
        let user = sessionStorage.getItem('currentUser');
        if (user) {
            currentUser = JSON.parse(user);
        } else {
            // Для демо: по умолчанию руководитель (можно поменять в консоли или добавить переключатель)
            // Но для теста пусть будет руководитель. Для проверки сотрудника - раскомментировать ниже или через sessionStorage.
            // По умолчанию создадим руководителя, чтобы не сломать логику.
            currentUser = { 
                role: 'manager',   // 'manager' или 'employee'
                name: 'Руководитель',
                alliance: null,
                group: null,
                employeeName: null
            };
            // Пример, как можно переключиться на сотрудника (для отладки):
            // currentUser = { role: 'employee', name: 'Сизый Александр Петрович', alliance: 'Пупкина', group: 'Группа Сизых', employeeName: 'Сизый Александр Петрович' };
        }
        
        // Если пользователь сотрудник, но не заполнены alliance/group — пытаемся найти по имени
        if (currentUser.role === 'employee' && currentUser.employeeName) {
            for (let alliance in alliancesData) {
                for (let grp of alliancesData[alliance]) {
                    if (grp.employees.includes(currentUser.employeeName)) {
                        currentUser.alliance = alliance;
                        currentUser.group = grp.name;
                        currentUser.name = currentUser.employeeName;
                        break;
                    }
                }
            }
        }
        
        document.getElementById('userRoleDisplay').innerHTML = currentUser.role === 'manager' ? '👑 Руководитель' : `👤 Сотрудник: ${currentUser.name}`;
        
        if (currentUser.role === 'manager') {
            document.getElementById('managerPanel').style.display = 'block';
            generateDateOptions();
            generateTimeOptions('startTime');
            generateTimeOptions('endTime');
        } else {
            document.getElementById('managerPanel').style.display = 'none';
        }
        
        refreshAllData();
    }
    
    // Обновление групп (для руководителя)
    function updateGroups() {
        if (currentUser.role !== 'manager') return;
        const alliance = document.getElementById('alliance').value;
        const groupSelect = document.getElementById('group');
        const employeeSelect = document.getElementById('employee');
        const scheduleForm = document.getElementById('scheduleForm');
        
        groupSelect.innerHTML = '<option value="">-- Выберите группу --</option>';
        employeeSelect.innerHTML = '<option value="">-- Сначала выберите группу --</option>';
        employeeSelect.disabled = true;
        
        if (alliance && alliancesData[alliance]) {
            alliancesData[alliance].forEach(group => {
                const option = document.createElement('option');
                option.value = group.name;
                option.textContent = group.name;
                groupSelect.appendChild(option);
            });
            groupSelect.disabled = false;
            scheduleForm.style.display = 'block';
        } else {
            groupSelect.disabled = true;
            scheduleForm.style.display = 'none';
        }
    }
    
    function updateEmployees() {
        if (currentUser.role !== 'manager') return;
        const alliance = document.getElementById('alliance').value;
        const group = document.getElementById('group').value;
        const employeeSelect = document.getElementById('employee');
        employeeSelect.innerHTML = '<option value="">-- Выберите сотрудника --</option>';
        if (alliance && group && alliancesData[alliance]) {
            const selectedGroup = alliancesData[alliance].find(g => g.name === group);
            if (selectedGroup) {
                selectedGroup.employees.forEach(emp => {
                    const option = document.createElement('option');
                    option.value = emp;
                    option.textContent = emp;
                    employeeSelect.appendChild(option);
                });
                employeeSelect.disabled = false;
            }
        } else {
            employeeSelect.disabled = true;
        }
    }
    
    function generateDateOptions() {
        const dateSelect = document.getElementById('date');
        if (!dateSelect) return;
        dateSelect.innerHTML = '';
        const today = new Date();
        for (let i = 0; i < 30; i++) {
            const date = new Date(today);
            date.setDate(today.getDate() + i);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const formattedDate = `${year}-${month}-${day}`;
            const weekdays = ['Воскресенье', 'Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота'];
            const weekday = weekdays[date.getDay()];
            const option = document.createElement('option');
            option.value = formattedDate;
            option.textContent = `${formattedDate} (${weekday})`;
            dateSelect.appendChild(option);
        }
    }
    
    function generateTimeOptions(selectId) {
        const select = document.getElementById(selectId);
        if (!select) return;
        select.innerHTML = '<option value="">-- Выберите время --</option>';
        if (selectId === 'startTime') {
            const dayOffOption = document.createElement('option');
            dayOffOption.value = 'Выходной';
            dayOffOption.textContent = 'Выходной';
            select.appendChild(dayOffOption);
        }
        for (let hour = 0; hour < 24; hour++) {
            for (let minute of [0, 15, 30, 45]) {
                if (selectId === 'startTime' && (hour < 6 || (hour === 6 && minute < 30))) continue;
                const timeValue = `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
                const option = document.createElement('option');
                option.value = timeValue;
                option.textContent = timeValue;
                select.appendChild(option);
            }
        }
    }
    
    function toggleEndTime() {
        if (currentUser.role !== 'manager') return;
        const startTime = document.getElementById('startTime').value;
        const endTimeSelect = document.getElementById('endTime');
        if (startTime === 'Выходной') {
            endTimeSelect.disabled = true;
            endTimeSelect.innerHTML = '<option value="">-- Выберите время --</option>';
        } else if (startTime) {
            endTimeSelect.disabled = false;
            endTimeSelect.innerHTML = '<option value="">-- Выберите время --</option>';
            const [startHour, startMinute] = startTime.split(':').map(Number);
            const startTotalMinutes = startHour * 60 + startMinute;
            for (let hour = 0; hour < 25; hour++) {
                for (let minute of [0, 15, 30, 45]) {
                    if (hour === 24 && minute > 0) continue;
                    let displayHour = hour;
                    let nextDay = false;
                    if (hour === 24) { displayHour = 0; nextDay = true; }
                    let endTotalMinutes = (hour === 24 ? 24*60 : hour * 60 + minute);
                    let adjustedEndTotalMinutes = endTotalMinutes;
                    if (hour < 6 && hour !== 24) adjustedEndTotalMinutes += 24*60;
                    if (adjustedEndTotalMinutes <= startTotalMinutes) continue;
                    if (adjustedEndTotalMinutes - startTotalMinutes > 720) continue;
                    if (hour > 2 && hour < 6 && hour !== 24) continue;
                    if (hour === 2 && minute > 0) continue;
                    const timeValue = `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
                    const timeLabel = nextDay ? `${String(displayHour).padStart(2, '0')}:${String(minute).padStart(2, '0')} (след. день)` : `${String(displayHour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
                    const option = document.createElement('option');
                    option.value = timeValue;
                    option.textContent = timeLabel;
                    endTimeSelect.appendChild(option);
                }
            }
        }
    }
    
    function checkConsecutiveShifts(employee, newDate) {
        if (!employee) return { canAdd: true, count: 0 };
        const sortedShifts = [...employee.shifts].sort((a,b) => new Date(a.date) - new Date(b.date));
        let maxConsecutive = 0, current = 0, lastDate = null;
        const allDates = [...sortedShifts.map(s => s.date), newDate].sort();
        for (let i=0; i<allDates.length; i++) {
            const curr = new Date(allDates[i]);
            if (lastDate) {
                const diff = Math.round((curr - lastDate) / (1000*3600*24));
                if (diff === 1) current++;
                else current = 1;
            } else current = 1;
            maxConsecutive = Math.max(maxConsecutive, current);
            lastDate = curr;
        }
        return { canAdd: maxConsecutive <= 6, count: maxConsecutive };
    }
    
    // Отображение таблицы в зависимости от роли
    function updateTable(employees) {
        const tableDiv = document.getElementById('employeesTable');
        tableDiv.innerHTML = '';
        
        if (currentUser.role === 'employee') {
            // Сотрудник видит только свое расписание
            const myEmp = employees.find(e => e.name === currentUser.name && e.alliance === currentUser.alliance && e.group === currentUser.group);
            if (!myEmp || myEmp.shifts.length === 0) {
                tableDiv.innerHTML = '<p>У вас пока нет назначенных смен.</p>';
                return;
            }
            const container = document.createElement('div');
            container.className = 'my-schedule';
            const title = document.createElement('h3');
            title.textContent = `📋 Расписание: ${myEmp.name} (${myEmp.alliance} - ${myEmp.group})`;
            container.appendChild(title);
            const shiftListDiv = document.createElement('div');
            const sortedShifts = [...myEmp.shifts].sort((a,b) => new Date(a.date) - new Date(b.date));
            sortedShifts.forEach(shift => {
                const shiftCard = document.createElement('div');
                shiftCard.className = 'shift-item';
                const dateObj = new Date(shift.date);
                const weekday = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'][dateObj.getDay()];
                let shiftText = `${shift.date} (${weekday}) - `;
                if (shift.startTime === 'Выходной') shiftText += `Выходной`;
                else shiftText += `${shift.startTime} - ${shift.endTime || '—'}`;
                const statusSpan = document.createElement('span');
                const isApproved = shift.approved === true;
                statusSpan.className = `status-badge ${isApproved ? 'status-approved' : 'status-pending'}`;
                statusSpan.textContent = isApproved ? '✓ Утверждено' : '⏳ Ожидает утверждения';
                shiftCard.innerHTML = `<span>${shiftText}</span>`;
                shiftCard.appendChild(statusSpan);
                shiftListDiv.appendChild(shiftCard);
            });
            container.appendChild(shiftListDiv);
            tableDiv.appendChild(container);
        } 
        else if (currentUser.role === 'manager') {
            if (employees.length === 0) {
                tableDiv.innerHTML = '<p>Нет внесенных графиков.</p>';
                return;
            }
            const grouped = {};
            employees.forEach((emp, idx) => {
                if (!grouped[emp.alliance]) grouped[emp.alliance] = {};
                if (!grouped[emp.alliance][emp.group]) grouped[emp.alliance][emp.group] = [];
                grouped[emp.alliance][emp.group].push({ ...emp, index: idx });
            });
            for (const alliance in grouped) {
                const allianceTable = document.createElement('table');
                allianceTable.innerHTML = `<caption><strong>${alliance}</strong></caption><thead><tr><th>Группа</th><th>Сотрудник</th><th>Смены (статус)</th><th>Макс. подряд</th><th>% будни</th><th>% выходные</th><th>Действия</th></tr></thead><tbody></tbody>`;
                for (const group in grouped[alliance]) {
                    grouped[alliance][group].forEach(emp => {
                        const metrics = calculateEmployeeMetrics(emp);
                        const maxConsecutive = calculateMaxConsecutiveShifts(emp);
                        const consecutiveClass = maxConsecutive > 6 ? 'warning' : '';
                        const shiftsHtml = emp.shifts.map(s => {
                            const statusText = s.approved ? '✅' : '⏳';
                            return `${s.date} (${s.startTime}${s.endTime ? '-'+s.endTime : ''}) ${statusText}`;
                        }).join('; ');
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${group}</td>
                            <td>${emp.name}</td>
                            <td>${shiftsHtml}</td>
                            <td class="${consecutiveClass}">${maxConsecutive}</td>
                            <td>${metrics.weekdayPercentage}%</td>
                            <td>${metrics.weekendPercentage}%</td>
                            <td class="action-buttons">
                                <button class="edit-btn" title="Редактировать смены" onclick="showEmployeeDetails(${emp.index})">✏️</button>
                                <button class="delete-btn" title="Удалить сотрудника" onclick="confirmDeleteEmployee(${emp.index})">🗑️</button>
                            </td>
                        `;
                        allianceTable.querySelector('tbody').appendChild(row);
                    });
                }
                tableDiv.appendChild(allianceTable);
            }
        }
    }
    
    function calculateEmployeeMetrics(emp) {
        let weekdayShifts = 0, weekendShifts = 0;
        emp.shifts.forEach(shift => {
            const day = new Date(shift.date).getDay();
            if (day >= 1 && day <= 5) weekdayShifts++;
            else weekendShifts++;
        });
        const total = emp.shifts.length;
        return {
            weekdayPercentage: total > 0 ? ((weekdayShifts/total)*100).toFixed(2) : '0.00',
            weekendPercentage: total > 0 ? ((weekendShifts/total)*100).toFixed(2) : '0.00'
        };
    }
    
    function calculateMaxConsecutiveShifts(employee) {
        if (!employee.shifts.length) return 0;
        const sorted = [...employee.shifts].sort((a,b)=>new Date(a.date)-new Date(b.date));
        let max=1, curr=1, last=new Date(sorted[0].date);
        for(let i=1;i<sorted.length;i++){
            const diff = Math.round((new Date(sorted[i].date)-last)/(86400000));
            if(diff===1) curr++;
            else curr=1;
            max=Math.max(max,curr);
            last=new Date(sorted[i].date);
        }
        return max;
    }
    
    function calculateSummary(employees) {
        let totalShifts = 0;
        let shiftsByDay = [0,0,0,0,0,0,0];
        let before11Shifts=0, after19Shifts=0, longShifts=0, employeesWithExcess=0;
        const dayNames = ['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
        employees.forEach(emp => {
            if(calculateMaxConsecutiveShifts(emp)>6) employeesWithExcess++;
            emp.shifts.forEach(shift => {
                totalShifts++;
                const day = new Date(shift.date).getDay();
                let dayIndex = day===0?6:day-1;
                shiftsByDay[dayIndex]++;
                if(shift.startTime !== 'Выходной'){
                    const startHour = parseInt(shift.startTime.split(':')[0]);
                    if(startHour<11) before11Shifts++;
                    if(shift.endTime){
                        const [sH,sM]=shift.startTime.split(':').map(Number);
                        let [eH,eM]=shift.endTime.split(':').map(Number);
                        let startTotal=sH*60+sM;
                        let endTotal=eH*60+eM;
                        if(eH<6 && eH!==0) endTotal+=1440;
                        if(eH===0 && eM===0 && sH>0) endTotal+=1440;
                        if(endTotal-startTotal>720) longShifts++;
                        let endHourFinal = eH;
                        if(eH===0 && sH>0) endHourFinal=24;
                        if(endHourFinal>19 || (shift.endTime==='00:00' && sH<19)) after19Shifts++;
                    }
                }
            });
        });
        if(totalShifts>0){
            let html = '<strong>Распределение смен по дням недели:</strong><br>';
            for(let i=0;i<7;i++) html+=`${dayNames[i]}: ${((shiftsByDay[i]/totalShifts)*100).toFixed(2)}% (${shiftsByDay[i]})<br>`;
            html += `<br><strong>Смены по времени:</strong><br>Начинаются до 11:00: ${((before11Shifts/totalShifts)*100).toFixed(2)}%<br>`;
            html += `Заканчиваются после 19:00: ${((after19Shifts/totalShifts)*100).toFixed(2)}%<br>`;
            document.getElementById('summaryWeekdays').innerHTML = html;
            let warns = [];
            if(employeesWithExcess) warns.push(`⚠️ ${employeesWithExcess} сотрудников имеют >6 смен подряд`);
            if(longShifts) warns.push(`⚠️ ${longShifts} смен длительнее 12 часов`);
            document.getElementById('summaryWeekends').innerHTML = warns.join('<br>');
        } else {
            document.getElementById('summaryWeekdays').innerHTML = 'Нет данных';
            document.getElementById('summaryWeekends').innerHTML = '';
        }
    }
    
    function refreshAllData() {
        const employees = loadEmployees();
        updateTable(employees);
        calculateSummary(employees);
    }
    
    // Функции модального окна
    function showDeleteModal(msg, callback) {
        document.getElementById('deleteModalMessage').textContent = msg;
        currentDeleteCallback = callback;
        document.getElementById('deleteModal').style.display = 'block';
    }
    function closeDeleteModal() { document.getElementById('deleteModal').style.display = 'none'; currentDeleteCallback=null; }
    document.getElementById('confirmDeleteBtn').onclick = () => { if(currentDeleteCallback) currentDeleteCallback(); closeDeleteModal(); };
    window.onclick = e => { if(e.target===document.getElementById('deleteModal')) closeDeleteModal(); };
    
    function confirmDeleteEmployee(index) {
        const employees = loadEmployees();
        const emp = employees[index];
        if(emp) showDeleteModal(`Удалить сотрудника ${emp.name} и все его смены?`, () => deleteEmployee(index));
    }
    function deleteEmployee(index){
        let employees = loadEmployees();
        employees.splice(index,1);
        saveEmployees(employees);
        hideEmployeeDetails();
        refreshAllData();
    }
    function deleteShift(empIndex, shiftIndex){
        let employees = loadEmployees();
        if(employees[empIndex] && employees[empIndex].shifts[shiftIndex]){
            employees[empIndex].shifts.splice(shiftIndex,1);
            if(employees[empIndex].shifts.length===0) employees.splice(empIndex,1);
            saveEmployees(employees);
            refreshAllData();
            if(document.getElementById('employeeDetails').style.display==='block') showEmployeeDetails(empIndex);
        }
    }
    function showEmployeeDetails(empIndex){
        const employees = loadEmployees();
        const emp = employees[empIndex];
        if(!emp) return;
        document.getElementById('employeeDetails').style.display = 'block';
        document.getElementById('detailsEmployeeName').innerHTML = emp.name;
        document.getElementById('detailsAllianceGroup').innerHTML = `${emp.alliance} - ${emp.group}`;
        const shiftsList = document.getElementById('shiftsList');
        shiftsList.innerHTML = '';
        const sorted = [...emp.shifts].sort((a,b)=>new Date(a.date)-new Date(b.date));
        sorted.forEach((shift, idx) => {
            const div = document.createElement('div');
            div.className = 'shift-item';
            const dateObj = new Date(shift.date);
            const weekday = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'][dateObj.getDay()];
            let info = `${shift.date} (${weekday}) - `;
            if(shift.startTime==='Выходной') info+=`Выходной`;
            else info+=`${shift.startTime} - ${shift.endTime || ''}`;
            const statusSpan = document.createElement('span');
            statusSpan.className = `status-badge ${shift.approved ? 'status-approved' : 'status-pending'}`;
            statusSpan.textContent = shift.approved ? 'Утверждено' : 'Ожидает';
            const actions = document.createElement('div');
            actions.className = 'action-buttons';
            const approveBtn = document.createElement('button');
            approveBtn.textContent = '✓ Утвердить';
            approveBtn.className = 'approve-btn';
            approveBtn.onclick = () => { toggleApprove(empIndex, idx, true); };
            const rejectBtn = document.createElement('button');
            rejectBtn.textContent = '✗ Отклонить';
            rejectBtn.className = 'reject-btn';
            rejectBtn.onclick = () => { toggleApprove(empIndex, idx, false); };
            const delBtn = document.createElement('button');
            delBtn.textContent = 'Удалить';
            delBtn.className = 'delete-shift-btn';
            delBtn.onclick = () => showDeleteModal('Удалить смену?', () => deleteShift(empIndex, idx));
            if(currentUser.role === 'manager'){
                actions.appendChild(approveBtn);
                actions.appendChild(rejectBtn);
            }
            actions.appendChild(delBtn);
            div.innerHTML = `<span>${info}</span>`;
            div.appendChild(statusSpan);
            div.appendChild(actions);
            shiftsList.appendChild(div);
        });
        const delEmpBtn = document.createElement('button');
        delEmpBtn.textContent = 'Удалить сотрудника';
        delEmpBtn.className = 'delete-btn';
        delEmpBtn.style.marginTop='12px';
        delEmpBtn.onclick = () => confirmDeleteEmployee(empIndex);
        shiftsList.appendChild(delEmpBtn);
    }
    function toggleApprove(empIndex, shiftIndex, approved){
        let employees = loadEmployees();
        if(employees[empIndex] && employees[empIndex].shifts[shiftIndex]){
            employees[empIndex].shifts[shiftIndex].approved = approved;
            saveEmployees(employees);
            refreshAllData();
            showEmployeeDetails(empIndex);
        }
    }
    function hideEmployeeDetails() { document.getElementById('employeeDetails').style.display = 'none'; }
    
    // Добавление графика для руководителя
    if(document.getElementById('scheduleForm')){
        document.getElementById('scheduleForm').addEventListener('submit', function(e){
            e.preventDefault();
            if(currentUser.role !== 'manager') return;
            const alliance = document.getElementById('alliance').value;
            const group = document.getElementById('group').value;
            const employeeName = document.getElementById('employee').value;
            const date = document.getElementById('date').value;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            if(!alliance || !group || !employeeName || !date || !startTime) { showError('Заполните все поля'); return; }
            if(startTime !== 'Выходной' && !endTime) { showError('Выберите время окончания'); return; }
            let employees = loadEmployees();
            let emp = employees.find(e => e.name===employeeName && e.alliance===alliance && e.group===group);
            const shift = { date, startTime, endTime: startTime==='Выходной' ? '' : endTime, approved: false };
            if(emp){
                const check = checkConsecutiveShifts(emp, date);
                if(!check.canAdd){ showError(`❌ Будет ${check.count} смен подряд (макс 6)`); return; }
                emp.shifts.push(shift);
            } else {
                employees.push({ name:employeeName, alliance, group, shifts:[shift] });
            }
            saveEmployees(employees);
            refreshAllData();
            document.getElementById('startTime').value='';
            document.getElementById('endTime').innerHTML='<option value="">-- Выберите время --</option>';
            document.getElementById('endTime').disabled=true;
            showError('');
        });
    }
    function showError(msg){ document.getElementById('errorMessage').innerText=msg; setTimeout(()=>{if(document.getElementById('errorMessage')) document.getElementById('errorMessage').innerText='';},3000); }
    
    // Инициализация
    initUser();
</script>
</body>
</html>
