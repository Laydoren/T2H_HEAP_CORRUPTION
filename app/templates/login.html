{% extends "base.html" %}
{% block title %}Вход — Планировщик графиков{% endblock %}

{% block body %}
<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect width="48" height="48" rx="12" fill="#2563EB"/>
        <path d="M14 24h20M24 14v20" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
        <rect x="10" y="10" width="10" height="10" rx="2" fill="#fff" fill-opacity="0.3"/>
        <rect x="28" y="10" width="10" height="10" rx="2" fill="#fff" fill-opacity="0.3"/>
        <rect x="10" y="28" width="10" height="10" rx="2" fill="#fff" fill-opacity="0.3"/>
        <rect x="28" y="28" width="10" height="10" rx="2" fill="#fff" fill-opacity="0.6"/>
      </svg>
    </div>

    <h1 class="login-title">Планировщик графиков</h1>
    <p class="login-subtitle">Войдите в свою учётную запись</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-error">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
      <div class="form-group">
        <label for="login">Логин</label>
        <input type="text" id="login" name="login"
               placeholder="Введите логин" required autocomplete="username" />
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password"
                 placeholder="Введите пароль" required autocomplete="current-password" />
          <button type="button" class="toggle-password" onclick="togglePassword()">
            <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary">Войти</button>
    </form>
  </div>
</div>

<script>
function togglePassword() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
